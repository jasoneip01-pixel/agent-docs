<style>
:root{
  --bg:#080c14;
  --surface:#0f1622;
  --surface2:#172036;
  --surface3:#1e2a45;
  --border:rgba(148,200,255,.07);
  --border-hover:rgba(148,200,255,.18);
  --text:#e2e8f0;
  --muted:#7888a8;
  --accent:#4dd0e1;
  --accent-dim:rgba(77,208,225,.08);
  --purple:#a78bfa;
  --purple-dim:rgba(167,139,250,.08);
  --green:#4ade80;
  --amber:#fbbf24;
  --red:#f87171;
  --radius:14px;
  --radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter','-apple-system','BlinkMacSystemFont','Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:15px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
::selection{background:rgba(77,208,225,.25);color:#fff}
.container{max-width:1100px;margin:0 auto;padding:0 24px}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid var(--border);margin-bottom:48px;}
.brand{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700;letter-spacing:-.3px;}
.brand-icon{width:36px;height:36px;border-radius:10px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:18px}
.brand span{color:var(--muted);font-weight:400;font-size:13px}
nav a{font-size:13px;color:var(--muted);text-decoration:none;margin-left:24px;transition:color .15s;}
nav a:hover{color:var(--text)}

/* Hero */
.hero{text-align:center;padding:40px 0 56px;}
.hero h1{font-size:clamp(28px,4.5vw,44px);font-weight:900;letter-spacing:-1.2px;line-height:1.15;margin-bottom:12px;}
.hero h1 .glow{background:linear-gradient(135deg,#4dd0e1 0%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:15px;color:var(--muted);max-width:500px;margin:0 auto 32px;line-height:1.7}
.hero-badge{display:inline-block;font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-dim);padding:4px 14px;border-radius:20px;margin-bottom:20px;letter-spacing:.2px;}

/* Toolbar */
.toolbar{display:flex;gap:12px;margin-bottom:40px;flex-wrap:wrap;align-items:center;justify-content:center;}
.search-wrap{position:relative;flex:1;max-width:380px;min-width:200px;}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;outline:none;transition:all .2s;font-family:inherit;}
.search-wrap input:focus{border-color:var(--accent);background:var(--surface2);box-shadow:0 0 0 3px rgba(77,208,225,.1)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{font-size:12px;font-weight:500;padding:7px 16px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap;}
.filter-btn:hover{border-color:var(--border-hover);color:var(--text)}
.filter-btn.active{background:var(--accent-dim);border-color:rgba(77,208,225,.25);color:var(--accent)}

/* Picks */
.picks-section{margin-bottom:48px}
.picks-header{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.picks-header h2{font-size:18px;font-weight:700;letter-spacing:-.3px}
.picks-header .tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;background:rgba(251,191,36,.12);color:var(--amber);}
.picks-grid,.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:60px}

/* Cards */
.tool-card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;gap:8px;}
.tool-card:hover{border-color:var(--border-hover);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.3);}
.tool-card.pick{border-color:rgba(251,191,36,.15);background:linear-gradient(135deg,var(--surface),rgba(251,191,36,.03));}
.tool-card.pick .pick-badge{position:absolute;top:-1px;right:20px;font-size:10px;font-weight:600;padding:2px 10px;border-radius:0 0 6px 6px;background:rgba(251,191,36,.15);color:var(--amber);}
.tool-card .c-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.tool-card .c-name{font-size:14px;font-weight:700;letter-spacing:-.2px;word-break:break-word;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tool-card .c-cat{font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;white-space:nowrap;background:var(--surface3);color:var(--muted);flex-shrink:0;}
.tool-card .c-desc{font-size:12px;color:var(--muted);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tool-card .c-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:6px;}
.c-version{font-size:10px;color:var(--muted)}
.c-tags{display:flex;gap:4px;flex-wrap:wrap}
.c-tag{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--surface2);color:var(--muted)}
.c-arrow{font-size:12px;color:var(--border-hover);transition:all .15s}
.tool-card:hover .c-arrow{color:var(--accent);transform:translateX(2px)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px;}
.modal-overlay.active{display:flex}
.modal{background:var(--surface2);border:1px solid var(--border-hover);border-radius:var(--radius);max-width:560px;width:100%;max-height:80vh;overflow-y:auto;padding:28px;position:relative;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.m-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:6px;border:none;background:var(--surface3);color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.m-close:hover{background:var(--surface);color:var(--text)}
.modal .m-name{font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
.modal .m-owner{font-size:13px;color:var(--muted);margin-bottom:16px}
.modal .m-desc{font-size:14px;line-height:1.7;color:var(--text);margin-bottom:20px}
.modal .m-meta{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.modal .m-meta-item{font-size:12px;color:var(--muted)}
.modal .m-meta-item strong{color:var(--text);font-weight:600}
.modal .m-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.modal .m-tag{font-size:11px;padding:3px 10px;border-radius:5px;background:var(--surface3);color:var(--muted)}
.modal .m-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--accent);text-decoration:none;padding:8px 18px;border-radius:8px;background:var(--accent-dim);transition:all .15s;}
.modal .m-link:hover{background:rgba(77,208,225,.15)}

/* Footer */
footer{border-top:1px solid var(--border);padding:28px 0;text-align:center;font-size:13px;color:var(--muted);}
footer a{color:var(--accent);text-decoration:none}

.count-badge{font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-dim);padding:3px 10px;border-radius:6px;margin-left:8px;vertical-align:middle}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;grid-column:1/-1}

@media(max-width:900px){.picks-grid,.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){
  .container{padding:0 16px}
  .picks-grid,.grid{grid-template-columns:1fr;gap:12px}
  header{flex-direction:column;gap:12px;padding:16px 0;margin-bottom:32px}
  .hero{padding:24px 0 32px}
  .toolbar{flex-direction:column}
  .search-wrap{max-width:100%}
  .filters{justify-content:center}
}

const CATEGORIES = ['developer','data','communication','automation','productivity'];
const CAT_LABELS = {'developer':'开发者工具','data':'数据处理','communication':'通讯协作','automation':'自动化','productivity':'效率工具'};
const CAT_COLORS = {'developer':'#4dd0e1','data':'#a78bfa','communication':'#4ade80','automation':'#fbbf24','productivity':'#f87171'};

// Editor's picks (curated)
const PICKS = ['agent-cost','cloudflare-mcp-server','mcp-server-atlassian-jira'];
let currentCat = 'all';

function init() {
  const fc = document.getElementById('filters');
  let h = '<button class="filter-btn active" data-cat="all" onclick="setCat(\'all\')">全部</button>';
  CATEGORIES.forEach(c => {
    h += '<button class="filter-btn" data-cat="'+c+'" onclick="setCat(\''+c+'\')">'+CAT_LABELS[c]+'</button>';
  });
  fc.innerHTML = h;
  renderPicks();
  renderAll();
}

function setCat(c) {
  currentCat = c;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === c));
  filterTools();
}

function filterTools() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let filtered = MCP_TOOLS.filter(t => {
    if (currentCat !== 'all' && t.category !== currentCat) return false;
    if (q) return t.name.toLowerCase().includes(q) || t.description.toLowerCase().includes(q) || (t.owner && t.owner.toLowerCase().includes(q));
    return !PICKS.includes(t.name);
  });
  document.getElementById('count-badge').textContent = filtered.length;
  renderGrid(filtered);
}

function renderPicks() {
  const picks = MCP_TOOLS.filter(t => PICKS.includes(t.name));
  const g = document.getElementById('picks-grid');
  if (!picks.length) { g.innerHTML = '<div class=\"empty-state\">编辑精选中...</div>'; return; }
  g.innerHTML = picks.map(t => cardHtml(t, true)).join('');
}

function renderAll() {
  const all = MCP_TOOLS.filter(t => !PICKS.includes(t.name));
  renderGrid(all);
}

function renderGrid(tools) {
  const g = document.getElementById('grid');
  if (!tools.length) { g.innerHTML = '<div class=\"empty-state\">没有匹配的工具。试试换个关键词？</div>'; return; }
  g.innerHTML = tools.map(t => cardHtml(t, false)).join('');
}

function cardHtml(t, isPick) {
  const tag = (t.tags && t.tags.length) ? t.tags[0] : null;
  const catColor = CAT_COLORS[t.category] || '#7888a8';
  const catLabel = CAT_LABELS[t.category] || t.category;
  const name = t.name.length > 28 ? t.name.slice(0,26)+'...' : t.name;
  const pickBadge = isPick ? '<div class=\"pick-badge\">&#10022; 精选</div>' : '';
  return '<div class=\"tool-card'+(isPick?' pick':'')+'\" onclick=\"openTool(\''+t.name+'\')\">'
    + pickBadge
    + '<div class=\"c-top\">'
    + '<div class=\"c-name\">'+name+'</div>'
    + '<span class=\"c-cat\" style=\"color:'+catColor+'\">'+catLabel+'</span>'
    + '</div>'
    + '<div class=\"c-desc\">'+t.description+'</div>'
    + '<div class=\"c-foot\">'
    + '<div class=\"c-tags\">'+(tag?'<span class=\"c-tag\">'+tag+'</span>':'')+'<span class=\"c-version\">v'+t.version+'</span></div>'
    + '<span class=\"c-arrow\">&#8594;</span>'
    + '</div></div>';
}

function openTool(name) {
  const t = MCP_TOOLS.find(x => x.name === name);
  if (!t) return;
  const tags = (t.tags||[]).map(tag => '<span class=\"m-tag\">'+tag+'</span>').join('');
  const catLabel = CAT_LABELS[t.category]||t.category;
  const catColor = CAT_COLORS[t.category]||'#7888a8';
  document.getElementById('modal-content').innerHTML =
    '<button class=\"m-close\" onclick=\"closeModal()\">&#10005;</button>'
    + '<div class=\"m-name\">'+t.name+'</div>'
    + '<div class=\"m-owner\">by '+(t.owner||'unknown')+' &middot; <span style=\"color:'+catColor+'\">'+catLabel+'</span></div>'
    + '<div class=\"m-desc\">'+t.description+'</div>'
    + '<div class=\"m-meta\">'
    + '<div class=\"m-meta-item\"><strong>版本</strong> v'+(t.version||'0.1')+'</div>'
    + '<div class=\"m-meta-item\"><strong>许可</strong> '+(t.license||'MIT')+'</div>'
    + (t.created ? '<div class=\"m-meta-item\"><strong>收录</strong> '+t.created.slice(0,10)+'</div>' : '')
    + '</div>'
    + (tags ? '<div class=\"m-tags\">'+tags+'</div>' : '')
    + (t.homepage ? '<a href=\"'+t.homepage+'\" target=\"_blank\" class=\"m-link\">&#8594; 查看详情</a>' : '');
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
init();
</script>
